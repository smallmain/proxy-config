name: Update Generated Configs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-generated-configs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout ios_rule_script
        uses: actions/checkout@v4
        with:
          repository: blackmatrix7/ios_rule_script
          path: ios_rule_script

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate config artifacts
        run: |
          python scripts/generate_client_configs.py --ios-rule-script-root ios_rule_script
          python scripts/generate_shadowrocket_conf.py
          python scripts/generate_surge_fake_ip_filter.py

      - name: Commit and push if changed
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git add config surge/fake-ip-filter.sgmodule shadowrocket/normal.conf shadowrocket/noresolve.conf

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update generated configs"
          git push origin HEAD:${BRANCH_NAME}
