name: Update Surge Fake IP Filter

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-surge-fake-ip-filter
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate Surge module
        run: python scripts/generate_surge_fake_ip_filter.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- surge/fake-ip-filter.sgmodule; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add surge/fake-ip-filter.sgmodule
          git commit -m "chore(surge): update fake-ip-filter.sgmodule"
          git push
